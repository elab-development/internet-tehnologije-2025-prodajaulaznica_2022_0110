version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ticket-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    ports:
      - "8000:9000"
    networks:
      - ticket-network
    depends_on:
      - db
      - redis
    environment:
      - DB_HOST=db
      - DB_DATABASE=ticket_app
      - DB_USERNAME=root
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
  vite:
    image: node:20
    container_name: ticket-vite
    working_dir: /var/www
    volumes:
      - ./:/var/www
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - ticket-network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: ticket-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: ticket_app
      MYSQL_ROOT_PASSWORD: secret
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - ticket-network

  redis:
    image: redis:alpine
    container_name: ticket-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    networks:
      - ticket-network

networks:
  ticket-network:
    driver: bridge

volumes:
  dbdata:
    driver: local
